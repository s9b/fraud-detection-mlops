data:
  raw_dir: data/raw
  processed_dir: data/processed
  train_transaction: data/raw/train_transaction.csv
  train_identity: data/raw/train_identity.csv
  test_transaction: data/raw/test_transaction.csv
  test_identity: data/raw/test_identity.csv
  processed_train: data/processed/train.parquet
  processed_test: data/processed/test.parquet
  target_column: isFraud
  test_size: 0.2
  random_state: 42

preprocessing:
  numeric_impute_strategy: median
  categorical_impute_strategy: constant
  categorical_fill_value: "unknown"
  drop_cols:
    - TransactionID

feature_engineering:
  time_features: true
  email_domain_features: true
  card_features: true

smote:
  sampling_strategy: 0.1
  k_neighbors: 5
  random_state: 42

model:
  name: xgboost_fraud_detector
  version: 1
  n_estimators: 300
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 5
  scale_pos_weight: 10
  reg_alpha: 0.1
  reg_lambda: 1.0
  random_state: 42
  n_jobs: -1
  eval_metric: aucpr
  early_stopping_rounds: 30

evaluation:
  threshold: 0.5
  metrics:
    - roc_auc
    - average_precision
    - f1
    - precision
    - recall
  auc_pr_improvement_threshold: 0.005

mlflow:
  experiment_name: fraud_detection
  model_registry_name: fraud_detector
  artifact_path: model
